<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Game of Life on ollama+GGUF</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
  /* 1996: browser defaults do the styling; CSS only where HTML cannot go */
  body { font-family: "Times New Roman", Times, serif; background: #c0c0c0; text-align: center; }
  h1 { font-size: 20px; }
  canvas { image-rendering: pixelated; max-width: 92vw; background: #232327; cursor: pointer; }
  #log { font: 11px/1.4 "Courier New", Courier, monospace; text-align: left; white-space: pre-wrap;
         word-break: break-all; max-width: 640px; max-height: 100px; overflow-y: auto;
         margin: 12px auto; background: #ffffff; border: 1px inset #808080; padding: 4px 6px; }
</style>
</head>
<body>
<h1>Game of Life</h1>
<p>generation: <b id="gen">0</b> &middot; population: <b id="pop">0</b><br>
   <output id="status"></output></p>
<canvas id="cv" width="480" height="480"></canvas>
<p id="controls">
  <button id="play">&#9654; play</button>
  <button id="step">step</button>
  <button id="clear">clear</button>
  <button id="random">random</button>
  <select id="preset">
    <option value="">preset&hellip;</option>
    <option value="glider">glider</option>
    <option value="blinker">blinker</option>
    <option value="toad">toad</option>
    <option value="beacon">beacon</option>
    <option value="lwss">lightweight spaceship</option>
    <option value="rpentomino">r-pentomino</option>
  </select>
</p>
<p><small>click cells to toggle them, the grid is a torus, every next generation is computed by ollama</small></p>
<pre id="log"></pre>



<script>
// ---- configuration -----------------------------------------------------------
const OLLAMA = "";
const MODEL  = "life";
const G = 12, N = G * G;                   // must match build_gguf.py
const PRESETS = {
  glider:     [[1,0],[2,1],[0,2],[1,2],[2,2]],
  blinker:    [[0,0],[1,0],[2,0]],
  toad:       [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]],
  beacon:     [[0,0],[1,0],[0,1],[1,1],[2,2],[3,2],[2,3],[3,3]],
  lwss:       [[1,0],[4,0],[0,1],[0,2],[4,2],[0,3],[1,3],[2,3],[3,3]],
  rpentomino: [[1,0],[2,0],[0,1],[1,1],[1,2]],
};

let grid = new Array(N).fill(0);
let generation = 0;
let playing = false;
let waiting = false;

// ---- one tick: grid -> next grid, computed by the model --------------------------
async function tick() {
  if (waiting) return;
  waiting = true;
  // due famiglie di token alternate per parita': mai due token uguali di fila
  // (il guard anti-loop di ollama tronca dopo ~30 token identici consecutivi)
  const prompt = "<NOOP>" + grid.map((c, i) => `<${i % 2 ? "O" : "E"}:${c}>`).join("");
  let text;
  try {
    const r = await fetch(`${OLLAMA}/api/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: MODEL, prompt, raw: true, stream: false,
        options: { temperature: 0, num_predict: N + 1, repeat_penalty: 1.0 }
      })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    text = (await r.json()).response;
  } catch (e) {
    setStatus(`ollama error: ${e.message} (OLLAMA_ORIGINS? model created?)`);
    playing = false; syncPlay(); waiting = false; return;
  }
  const cells = [...text.matchAll(/<[EO]:([01])>/g)].map(m => +m[1]);
  if (cells.length !== N) {
    setStatus(`unexpected output: ${text.slice(0, 80)}`);
    playing = false; syncPlay(); waiting = false; return;
  }
  grid = cells;
  generation++;
  log(`gen ${generation}: ${grid.reduce((a, b) => a + b, 0)} alive`);
  draw();
  setStatus("");
  waiting = false;
}

async function loop() {
  while (playing) {
    await tick();
    await new Promise(r => setTimeout(r, 120));
  }
}

// ---- rendering ----------------------------------------------------------------
const cv = document.getElementById("cv"), cx = cv.getContext("2d");
const CW = cv.width / G;
function draw() {
  cx.fillStyle = "#232327"; cx.fillRect(0, 0, cv.width, cv.height);
  cx.fillStyle = "#98c379";
  for (let i = 0; i < N; i++)
    if (grid[i]) cx.fillRect((i % G) * CW + 1, ((i / G) | 0) * CW + 1, CW - 2, CW - 2);
  cx.strokeStyle = "#2d2d33";
  for (let k = 1; k < G; k++) {
    cx.beginPath(); cx.moveTo(k * CW, 0); cx.lineTo(k * CW, cv.height); cx.stroke();
    cx.beginPath(); cx.moveTo(0, k * CW); cx.lineTo(cv.width, k * CW); cx.stroke();
  }
  document.getElementById("gen").textContent = generation;
  document.getElementById("pop").textContent = grid.reduce((a, b) => a + b, 0);
}

// ---- input --------------------------------------------------------------------
cv.addEventListener("click", e => {
  const r = cv.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / CW), y = Math.floor((e.clientY - r.top) / CW);
  if (x < 0 || x >= G || y < 0 || y >= G) return;
  grid[y * G + x] ^= 1;
  draw();
});
function syncPlay() {
  document.getElementById("play").textContent = playing ? "⏸ pause" : "▶ play";
}
document.getElementById("play").onclick = () => {
  playing = !playing;
  syncPlay();
  if (playing) loop();
};
document.getElementById("step").onclick = () => { if (!playing) tick(); };
document.getElementById("clear").onclick = () => {
  playing = false; syncPlay(); grid = new Array(N).fill(0); generation = 0; draw();
};
document.getElementById("random").onclick = () => {
  grid = grid.map(() => Math.random() < 0.35 ? 1 : 0); generation = 0; draw();
};
document.getElementById("preset").onchange = e => {
  const cells = PRESETS[e.target.value];
  if (!cells) return;
  grid = new Array(N).fill(0);
  for (const [x, y] of cells) grid[(y + 4) * G + (x + 4)] = 1;
  generation = 0; draw();
  e.target.value = "";
};
document.addEventListener("keydown", e => {
  if (e.key !== " ") return;
  e.preventDefault();
  document.getElementById("play").onclick();
});

// ---- utils ----------------------------------------------------------------------
function setStatus(s) { document.getElementById("status").textContent = s; }
function log(s) {
  const el = document.getElementById("log");
  el.textContent = (s + "\n" + el.textContent).slice(0, 3000);
}

// start with a glider
for (const [x, y] of PRESETS.glider) grid[(y + 4) * G + (x + 4)] = 1;
draw();
</script>
</body>
</html>
