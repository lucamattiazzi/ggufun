<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake on ollama+GGUF</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
  body { font-family: "Times New Roman", Times, serif; background: #c0c0c0; text-align: center; }
  h1 { font-size: 20px; }
  canvas { image-rendering: pixelated; max-width: min(92vw, 360px); height: auto; background: #232327; }
  #log { font: 11px/1.4 "Courier New", Courier, monospace; text-align: left; white-space: pre-wrap;
         word-break: break-all; max-width: 640px; max-height: 120px; overflow-y: auto;
         margin: 12px auto; background: #ffffff; border: 1px inset #808080; padding: 4px 6px; }
  .dead { color: #cc0000; } .ate { color: #006600; }
  /* touch d-pad: works with mouse too, essential on mobile */
  #dpad { display: grid; justify-content: center; grid-template-columns: repeat(3, 64px);
          grid-template-rows: repeat(2, 64px); gap: 8px;
          user-select: none; -webkit-user-select: none; }
  #dpad button { font-size: 24px; touch-action: manipulation;
                 -webkit-tap-highlight-color: transparent; }
  #dpad .up   { grid-column: 2; grid-row: 1; }
  #dpad .left { grid-column: 1; grid-row: 2; }
  #dpad .down { grid-column: 2; grid-row: 2; }
  #dpad .right{ grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<h1>Snake</h1>
<p>direction: <b id="dir">R</b> &middot; turn: <b id="turn">0</b>/57 &middot;
   score: <b id="score">0</b> &middot; length: <b id="len">3</b><br>
   <output id="status">press an arrow key or tap a button to start</output></p>
<canvas id="cv" width="360" height="360"></canvas>
<p id="dpad">
  <button class="up"    data-dir="U" aria-label="up">&#9650;</button>
  <button class="left"  data-dir="L" aria-label="left">&#9664;</button>
  <button class="down"  data-dir="D" aria-label="down">&#9660;</button>
  <button class="right" data-dir="R" aria-label="right">&#9654;</button>
</p>
<p><button id="restart">restart</button></p>
<pre id="log"></pre>



<script>
// ---- configuration ------------------------------------------------------------
const OLLAMA = "";   // ollama server
const MODEL  = "snake";                    // name given with `ollama create`
const TICK_MS = 700;                       // game tick period
const G = 6, MAXTURNS = 57, LMAX = 8;
const START_SEG = 13, START_HEAD = 7;      // cid(1,2), cid(1,1)

// ---- frontend state: ONLY a mirror for rendering --------------------------------
// food and length are the MODEL's authority: they come from the <F:c,l> tokens
let transcript, snake, len, food, dir, turn, score, over, waiting;

function reset() {
  dir = "R"; turn = 0; score = 0; len = 3; over = false; waiting = false;
  snake = [START_SEG, START_HEAD];          // [oldest, ..., head]
  // the seed of the game: the only randomness is the initial food in the prefix
  const f0cands = [];
  for (let c = 0; c < G*G; c++) if (c !== START_SEG && c !== START_HEAD) f0cands.push(c);
  food = f0cands[Math.floor(Math.random() * f0cands.length)];
  transcript = `<NOOP><P:${START_SEG}><OK><F:${food},3>` +
               `<NOOP><P:${START_HEAD}><OK><F:${food},3>`;
  document.getElementById("turn").textContent = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("len").textContent = 3;
  setStatus("press an arrow key or tap a button to start");
  draw();
}

// ---- model call: 1 turn = 3 generated tokens -------------------------------------
async function tick() {
  if (over || waiting) return;
  if (turn >= MAXTURNS) { gameOver("context exhausted (turn limit)"); return; }
  waiting = true;
  const input = `<M:${dir}>`;              // EVERYTHING the frontend provides
  const prompt = transcript + input;
  let text;
  try {
    const r = await fetch(`${OLLAMA}/api/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: MODEL, prompt, raw: true, stream: false,
        options: { temperature: 0, num_predict: 3, repeat_penalty: 1.0 }
      })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    text = (await r.json()).response;
  } catch (e) {
    setStatus(`ollama error: ${e.message} (OLLAMA_ORIGINS? model created?)`);
    waiting = false; return;
  }
  log(`> ${input}   < ${text}`);
  step(input, text);
}

// ---- advance one turn --------------------------------------------------------------
function step(input, text) {
  const mPos = text.match(/<P:(\d+)>/);
  const mSt  = text.match(/<(OK|ATE|DEAD)>/);
  const mF   = text.match(/<F:(\d+),(\d+)>/);
  if (!mPos || !mSt || !mF) { gameOver(`unexpected output: ${JSON.stringify(text)}`); return; }
  const newHead = parseInt(mPos[1], 10), st = mSt[1];

  transcript += input + `<P:${newHead}><${st}><F:${mF[1]},${mF[2]}>`;
  turn++; document.getElementById("turn").textContent = turn;

  if (st === "DEAD") { snake.push(newHead); draw(); gameOver("DEAD — collision"); return; }
  snake.push(newHead);
  // food and length: read from the <F:c,l> token generated by the model
  food = parseInt(mF[1], 10);
  len  = parseInt(mF[2], 10);
  document.getElementById("len").textContent = len;
  if (st === "ATE") {
    score++; document.getElementById("score").textContent = score;
    flashStatus(len === LMAX ? "ATE! (max length)" : "ATE!", "ate");
  }
  while (snake.length > len) snake.shift();
  draw(); waiting = false;
}

// ---- rendering ---------------------------------------------------------------
const cv = document.getElementById("cv"), cx = cv.getContext("2d"), CS = 60;
function draw() {
  cx.fillStyle = "#232327"; cx.fillRect(0, 0, cv.width, cv.height);
  cx.strokeStyle = "#333";
  for (let i = 1; i < G; i++) {
    cx.beginPath(); cx.moveTo(i*CS, 0); cx.lineTo(i*CS, cv.height); cx.stroke();
    cx.beginPath(); cx.moveTo(0, i*CS); cx.lineTo(cv.width, i*CS); cx.stroke();
  }
  const cell = (c, color, pad) => {
    const x = (c % G) * CS, y = Math.floor(c / G) * CS;
    cx.fillStyle = color; cx.fillRect(x+pad, y+pad, CS-2*pad, CS-2*pad);
  };
  cell(food, "#e06c75", 19);   // if the food is under the body, it stays covered
  snake.forEach((c, i) => cell(c, i === snake.length-1 ? "#98c379" : "#5c8a4a", 6));
}

// ---- input & loop --------------------------------------------------------------
const KEY = { ArrowLeft: "L", ArrowRight: "R", ArrowUp: "U", ArrowDown: "D" };
let started = false;
function setDir(d) {
  if (over) return;
  dir = d;
  document.getElementById("dir").textContent = dir;
  if (!started) { started = true; setStatus("playing"); }
}
document.addEventListener("keydown", e => {
  if (!(e.key in KEY)) return;
  e.preventDefault();
  setDir(KEY[e.key]);
});
// d-pad: pointerdown (not click) for instant response on touch screens
document.querySelectorAll("#dpad button").forEach(b => {
  b.addEventListener("pointerdown", e => { e.preventDefault(); setDir(b.dataset.dir); });
});
setInterval(() => { if (started) tick(); }, TICK_MS);
document.getElementById("restart").onclick = () => { started = false; reset(); };

function setStatus(s, cls) {
  const el = document.getElementById("status");
  el.textContent = s; el.className = cls || "";
}
function flashStatus(s, cls) { setStatus(s, cls); setTimeout(() => setStatus("playing"), 900); }
function gameOver(why) { over = true; waiting = false; setStatus(`game over: ${why}`, "dead"); }
function log(s) {
  const el = document.getElementById("log");
  el.textContent = (s + "\n" + el.textContent).slice(0, 4000);
}
reset();
</script>
</body>
</html>
