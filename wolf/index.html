<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wolf on ollama+GGUF</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<style>
  /* 1996: browser defaults do the styling; CSS only where HTML cannot go */
  body { font-family: "Times New Roman", Times, serif; background: #c0c0c0; text-align: center; }
  h1 { font-size: 20px; }
  canvas { image-rendering: pixelated; max-width: 92vw; background: #2a2a33; }
  #log { font: 11px/1.4 "Courier New", Courier, monospace; text-align: left; white-space: pre-wrap;
         word-break: break-all; max-width: 640px; max-height: 100px; overflow-y: auto;
         margin: 12px auto; background: #ffffff; border: 1px inset #808080; padding: 4px 6px; }
</style>
</head>
<body>
<h1>Wolf</h1>
<p>position: <b id="pos">?</b> &middot; facing: <b id="ang">?</b><br>
   <output id="status">loading initial view&hellip;</output></p>
<canvas id="cv" width="640" height="400"></canvas>
<p>arrows: &larr; &rarr; turn, &uarr; &darr; forward/backward (one tick per key press)</p>
<pre id="log"></pre>



<script>
// ---- configuration -----------------------------------------------------------
const OLLAMA = "";
const MODEL  = "wolf";
const NCOLS = 32, NHLEV = 14, NANG = 16;
const SPAWN = { x: 3, y: 3, a: 0 };        // must match build_gguf.py
const DIRS = ["E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW","N","NNE","NE","ENE"];

let state = { ...SPAWN };
let waiting = false;

// ---- one tick: state+input -> new state + frame ---------------------------------
async function tick(input) {
  if (waiting) return;
  waiting = true;
  const prompt = `<NOOP><X:${state.x}><Y:${state.y}><A:${state.a}><I:${input}>`;
  let text;
  try {
    const r = await fetch(`${OLLAMA}/api/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: MODEL, prompt, raw: true, stream: false,
        options: { temperature: 0, num_predict: 35, repeat_penalty: 1.0 }
      })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    text = (await r.json()).response;
  } catch (e) {
    setStatus(`ollama error: ${e.message} (OLLAMA_ORIGINS? model created?)`);
    waiting = false; return;
  }
  const mX = text.match(/<X:(\d+)>/), mY = text.match(/<Y:(\d+)>/), mA = text.match(/<A:(\d+)>/);
  const cols = [...text.matchAll(/<C(\d+):(\d+),(\d+)>/g)];
  if (!mX || !mY || !mA || cols.length !== NCOLS) {
    setStatus(`unexpected output: ${text.slice(0, 80)}`); waiting = false; return;
  }
  state = { x: +mX[1], y: +mY[1], a: +mA[1] };
  log(`> <I:${input}>   < X:${state.x} Y:${state.y} A:${state.a}`);
  document.getElementById("pos").textContent = `(${state.x},${state.y})`;
  document.getElementById("ang").textContent = DIRS[state.a];
  draw(cols);
  setStatus("");
  waiting = false;
}

// ---- rendering: 32 columns, height+face; the rest is ceiling/floor ----------------
const cv = document.getElementById("cv"), cx = cv.getContext("2d");
const CW = cv.width / NCOLS;
function draw(cols) {
  cx.fillStyle = "#2a2a33"; cx.fillRect(0, 0, cv.width, cv.height / 2);   // ceiling
  cx.fillStyle = "#4a4038"; cx.fillRect(0, cv.height / 2, cv.width, cv.height / 2); // floor
  for (const m of cols) {
    const i = +m[1], h = +m[2], side = +m[3];
    const wh = (h / NHLEV) * cv.height;
    // lower = farther = darker; the two wall faces get different tints
    const l = 25 + 55 * (h / NHLEV);
    cx.fillStyle = side === 0 ? `rgb(${l * 2.0},${l * 1.1},${l * 0.7})`
                              : `rgb(${l * 1.5},${l * 0.8},${l * 0.5})`;
    cx.fillRect(i * CW, (cv.height - wh) / 2, CW + 0.5, wh);
  }
}

// ---- input --------------------------------------------------------------------
const KEY = { ArrowLeft: "L", ArrowRight: "R", ArrowUp: "F", ArrowDown: "B" };
document.addEventListener("keydown", e => {
  if (!(e.key in KEY)) return;
  e.preventDefault();
  tick(KEY[e.key]);
});

// ---- utils ----------------------------------------------------------------------
function setStatus(s) { document.getElementById("status").textContent = s; }
function log(s) {
  const el = document.getElementById("log");
  el.textContent = (s + "\n" + el.textContent).slice(0, 3000);
}

// initial view: a frame only arrives with a tick, so turn left and back right —
// the final state is the spawn, and the second frame is its view
(async () => { await tick("L"); await tick("R"); })();
</script>
</body>
</html>
